<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Drawing Canvas</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- p5.js for canvas drawing -->
    <script src="https://cdn.jsdelivr.net/npm/p5@1.4.0/lib/p5.js"></script>
    <!-- ml5.js for machine learning -->
    <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col justify-center items-center font-sans p-4">

    <div class="w-full max-w-xl bg-slate-900 border border-slate-800 rounded-2xl shadow-2xl p-6 space-y-6">
        <!-- Header / Status -->
        <div class="flex justify-between items-center border-b border-slate-800 pb-4">
            <div>
                <h1 class="text-lg font-bold tracking-tight text-white flex items-center gap-2">
                    <i class="fa-solid fa-palette text-indigo-500"></i> AI Sketch Canvas
                </h1>
                <p class="text-xs text-slate-400">Release drawing to classify immediately</p>
            </div>
            <span id="model-status" class="text-xs font-semibold px-2.5 py-1 rounded-full bg-amber-500/10 border border-amber-500/30 text-amber-400">
                Loading Model...
            </span>
        </div>

        <!-- Canvas Container -->
        <div class="relative bg-white aspect-[4/3] w-full rounded-xl overflow-hidden border-2 border-slate-700 flex items-center justify-center">
            <div id="p5-canvas-holder" class="w-full h-full"></div>
        </div>

        <!-- Tools Grid -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 bg-slate-950 p-4 rounded-xl border border-slate-800">
            <!-- Brush Controls -->
            <div class="space-y-3">
                <div class="flex justify-between text-xs">
                    <span class="text-slate-400">Brush Size</span>
                    <span id="brush-size-val" class="font-mono text-indigo-400 font-semibold">12px</span>
                </div>
                <input type="range" id="brush-size" min="4" max="40" value="12" oninput="updateBrushSize(this.value)" class="w-full accent-indigo-500 h-1.5 bg-slate-800 rounded-lg appearance-none cursor-pointer">
                
                <!-- Color Selector -->
                <div class="flex gap-2 pt-1">
                    <button onclick="setBrushColor('#000000')" class="w-6 h-6 rounded-full bg-black border border-slate-600 hover:scale-110 active:scale-95 transition"></button>
                    <button onclick="setBrushColor('#3b82f6')" class="w-6 h-6 rounded-full bg-blue-500 hover:scale-110 active:scale-95 transition"></button>
                    <button onclick="setBrushColor('#ef4444')" class="w-6 h-6 rounded-full bg-red-500 hover:scale-110 active:scale-95 transition"></button>
                    <button onclick="setBrushColor('#10b981')" class="w-6 h-6 rounded-full bg-emerald-500 hover:scale-110 active:scale-95 transition"></button>
                    <button onclick="toggleEraser()" id="btn-eraser" class="flex-1 bg-slate-900 hover:bg-slate-800 border border-slate-700 text-slate-300 text-[11px] py-1 px-2 rounded-md transition flex items-center justify-center gap-1.5">
                        <i class="fa-solid fa-eraser"></i> Eraser Mode
                    </button>
                </div>
            </div>

            <!-- Canvas Operations -->
            <div class="flex flex-col justify-between gap-2">
                <button onclick="clearCanvas()" class="w-full bg-rose-500/10 hover:bg-rose-500 text-rose-400 hover:text-white border border-rose-500/20 py-2.5 rounded-lg text-xs font-semibold transition flex items-center justify-center gap-1.5">
                    <i class="fa-solid fa-trash-can"></i> Clear Canvas
                </button>
                <button onclick="undoStroke()" class="w-full bg-slate-900 hover:bg-slate-800 border border-slate-700 text-slate-300 py-2.5 rounded-lg text-xs font-semibold transition flex items-center justify-center gap-1.5">
                    <i class="fa-solid fa-undo"></i> Undo Last Stroke
                </button>
            </div>
        </div>

        <!-- Live Predictions Box -->
        <div class="bg-slate-950 p-4 rounded-xl border border-slate-800 space-y-3">
            <h3 class="text-xs font-bold uppercase tracking-wider text-slate-400 flex items-center gap-1.5">
                <i class="fa-solid fa-square-poll-horizontal text-indigo-400"></i> Classification Results
            </h3>
            <div id="results-list" class="space-y-3">
                <p class="text-xs text-slate-500 text-center py-2">Inference outputs will render here once you draw.</p>
            </div>
        </div>
    </div>

    <!-- Script Implementations -->
    <script>
        let p5Instance = null;
        let classifier = null;
        let brushColor = '#000000';
        let strokeHistory = [];
        let isEraserMode = false;

        // Custom Teachable Machine model endpoint configured to load on startup
        const TM_URL = "https://teachablemachine.withgoogle.com/models/7NVpZYw2V/";

        window.onload = () => {
            initSketchEngine();
        };

        // Initialize drawing engine
        function initSketchEngine() {
            if (p5Instance) p5Instance.remove();

            const sketch = (s) => {
                let strokePath = [];

                s.setup = () => {
                    const parent = document.getElementById('p5-canvas-holder');
                    const canvasWidth = parent.clientWidth || 512;
                    const canvasHeight = parent.clientHeight || 384;
                    
                    let canvas = s.createCanvas(canvasWidth, canvasHeight);
                    canvas.parent('p5-canvas-holder');
                    s.background(255);
                    s.pixelDensity(1);
                    
                    // Immediately trigger model downloads
                    loadTeachableMachine(TM_URL);
                };

                s.draw = () => {
                    if (s.mouseIsPressed) {
                        let col = isEraserMode ? '#FFFFFF' : brushColor;
                        let size = isEraserMode ? 24 : parseInt(document.getElementById('brush-size').value);
                        
                        s.stroke(col);
                        s.strokeWeight(size);
                        s.line(s.pmouseX, s.pmouseY, s.mouseX, s.mouseY);

                        strokePath.push({
                            x1: s.pmouseX,
                            y1: s.pmouseY,
                            x2: s.mouseX,
                            y2: s.mouseY,
                            color: col,
                            size: size
                        });
                    }
                };

                s.mouseReleased = () => {
                    if (strokePath.length > 0) {
                        strokeHistory.push([...strokePath]);
                        strokePath = [];
                    }
                    
                    // Classify immediately upon completing a stroke
                    classifyDrawing();
                };

                s.clearBoard = () => {
                    s.background(255);
                    strokeHistory = [];
                };

                s.undoBoard = () => {
                    if (strokeHistory.length === 0) return;
                    strokeHistory.pop();
                    
                    s.background(255);
                    strokeHistory.forEach(stroke => {
                        stroke.forEach(seg => {
                            s.stroke(seg.color);
                            s.strokeWeight(seg.size);
                            s.line(seg.x1, seg.y1, seg.x2, seg.y2);
                        });
                    });
                };
            };

            p5Instance = new p5(sketch);
        }

        // Handle downloading Teachable Machine models directly
        function loadTeachableMachine(url) {
            updateStatus("Downloading ML Model...", "warning");
            classifier = ml5.imageClassifier(url + 'model.json', () => {
                updateStatus("Model Ready!", "success");
            }, (err) => {
                console.error(err);
                updateStatus("Error Loading Model", "error");
            });
        }

        // Run inference on the drawing board canvas
        function classifyDrawing() {
            if (!classifier || !p5Instance) return;
            classifier.classify(p5Instance, (error, results) => {
                if (error) {
                    console.error(error);
                    return;
                }
                renderResults(results);
            });
        }

        // Render predictions inside progress bar items
        function renderResults(results) {
            const container = document.getElementById('results-list');
            container.innerHTML = '';

            if (!results || results.length === 0) {
                container.innerHTML = `<p class="text-xs text-slate-500 text-center py-2">No categories identified.</p>`;
                return;
            }

            results.slice(0, 3).forEach((item, index) => {
                const percent = (item.confidence * 100).toFixed(1);
                const activeColor = index === 0 ? 'bg-gradient-to-r from-indigo-500 to-purple-500' : 'bg-slate-700';
                const labelStyle = index === 0 ? 'text-indigo-300 font-bold' : 'text-slate-300';

                container.innerHTML += `
                    <div class="space-y-1">
                        <div class="flex justify-between text-xs font-semibold">
                            <span class="${labelStyle}">${index + 1}. ${item.label}</span>
                            <span class="text-indigo-400 font-mono">${percent}%</span>
                        </div>
                        <div class="w-full bg-slate-900 h-2 rounded-full overflow-hidden border border-slate-800">
                            <div class="h-full rounded-full transition-all duration-300 ${activeColor}" style="width: ${percent}%"></div>
                        </div>
                    </div>`;
            });
        }

        // Brush helpers
        function updateBrushSize(val) {
            document.getElementById('brush-size-val').innerText = val + "px";
        }

        function setBrushColor(hex) {
            brushColor = hex;
            isEraserMode = false;
            document.getElementById('btn-eraser').classList.remove('bg-slate-800', 'border-indigo-500');
        }

        function toggleEraser() {
            isEraserMode = !isEraserMode;
            const btn = document.getElementById('btn-eraser');
            if (isEraserMode) {
                btn.classList.add('bg-slate-800', 'border-indigo-500');
            } else {
                btn.classList.remove('bg-slate-800', 'border-indigo-500');
            }
        }

        function clearCanvas() {
            if (p5Instance) p5Instance.clearBoard();
            document.getElementById('results-list').innerHTML = `
                <p class="text-xs text-slate-500 text-center py-2">Canvas cleared. Write or sketch to categorize.</p>`;
        }

        function undoStroke() {
            if (p5Instance) {
                p5Instance.undoBoard();
                classifyDrawing();
            }
        }

        function updateStatus(text, type) {
            const badge = document.getElementById('model-status');
            badge.innerText = text;

            if (type === "success") {
                badge.className = "text-xs font-semibold px-2.5 py-1 rounded-full bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 animate-none";
            } else if (type === "error") {
                badge.className = "text-xs font-semibold px-2.5 py-1 rounded-full bg-rose-500/10 border border-rose-500/30 text-rose-400 animate-none";
            } else {
                badge.className = "text-xs font-semibold px-2.5 py-1 rounded-full bg-amber-500/10 border border-amber-500/30 text-amber-400 animate-pulse";
            }
        }
    </script>
</body>
</html>
